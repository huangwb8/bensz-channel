[env]
WEB_HOST = "localhost"
WEB_PORT = 6542
MAILPIT_PORT = 8025
AUTH_HOST = "auth"
AUTH_PORT = 3001
AUTH_DB_SCHEMA = "auth"

APP_NAME = "Bensz Channel"
APP_ENV = "production"
APP_DEBUG = false
APP_LOCALE = "zh_CN"
APP_FALLBACK_LOCALE = "zh_CN"
APP_FAKER_LOCALE = "zh_CN"
APP_MAINTENANCE_DRIVER = "file"

SITE_NAME = "Bensz Channel"
SITE_TAGLINE = "类 QQ 频道的 Web 社区原型，支持静态游客访问与成员互动"

LOG_CHANNEL = "stack"
LOG_STACK = "stderr"
LOG_LEVEL = "info"

DB_CONNECTION = "pgsql"
DB_HOST = "postgres"
DB_PORT = 5432
DB_DATABASE = "bensz_channel"
DB_USERNAME = "bensz"

SESSION_DRIVER = "database"
SESSION_COOKIE = "bensz_channel_session"
SESSION_LIFETIME = 120
SESSION_ENCRYPT = false
SESSION_PATH = "/"
SESSION_DOMAIN = "null"

QUEUE_CONNECTION = "database"

CACHE_STORE = "redis"
REDIS_CLIENT = "phpredis"
REDIS_HOST = "redis"
REDIS_PORT = 6379

MAIL_MAILER = "smtp"
MAIL_HOST = "mailpit"
MAIL_PORT = 1025
MAIL_SCHEME = "null"
MAIL_FROM_ADDRESS = "noreply@bensz-channel.local"

AUTH_DRIVER = "better_auth"
AUTH_OTP_TTL = 10
AUTH_OTP_LENGTH = 6
AUTH_QR_TTL = 10
AUTH_PREVIEW_CODES = false
BETTER_AUTH_TIMEOUT = 5

WECHAT_QR_MODE = "demo"
WECHAT_CLIENT_ID = ""
WECHAT_TIMEOUT = 8

QQ_QR_MODE = "demo"
QQ_CLIENT_ID = ""
QQ_TIMEOUT = 8

STATIC_SITE_ENABLED = true
STATIC_SITE_OUTPUT_DIR = "static"

ADMIN_NAME = "频道管理员"
ADMIN_EMAIL = "admin@example.com"
