name: Create Release from config.yaml

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep -A 2 'project_info:' config.yaml | grep 'version:' | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} does not exist"
          fi

      - name: Generate release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          # 从 CHANGELOG.md 提取当前版本的变更内容
          VERSION="${{ steps.version.outputs.version }}"

          # 尝试提取 CHANGELOG.md 中的内容
          if [ -f "CHANGELOG.md" ]; then
            # 提取当前版本的变更内容（从 ## [版本号] 到下一个 ## 之间的内容）
            NOTES=$(awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | sed '1d;$d' | sed '/^$/d')

            if [ -z "$NOTES" ]; then
              NOTES="Release version ${VERSION}"
            fi
          else
            NOTES="Release version ${VERSION}"
          fi

          # 保存到文件以避免多行字符串问题
          echo "$NOTES" > release_notes.txt
          echo "Generated release notes from CHANGELOG.md"

      - name: Create Git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.txt', 'utf8');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag }}',
              name: '${{ steps.version.outputs.tag }}',
              body: releaseNotes,
              draft: false,
              prerelease: ${{ inputs.prerelease }}
            });

            core.info('Release ${{ steps.version.outputs.tag }} created successfully');

      - name: Skip if tag exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "::warning::Tag ${{ steps.version.outputs.tag }} already exists. Skipping release creation."
          echo "If you want to create a new release, please update the version in config.yaml first."
