name: Publish release Docker images

on:
  schedule:
    # 每天北京时间 02:00 执行（UTC 18:00）
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-release-images
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve latest GitHub release
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              core.setOutput('found', 'true');
              core.setOutput('tag', data.tag_name);
              core.setOutput('url', data.html_url);
              core.info(`Latest release detected: ${data.tag_name}`);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('found', 'false');
                core.setOutput('tag', '');
                core.setOutput('url', '');
                core.info('No published GitHub release found. Skipping publish workflow.');
                return;
              }

              throw error;
            }

      - name: Skip when no published release exists
        if: steps.release.outputs.found != 'true'
        run: echo 'No published GitHub release found. Nothing to publish.'

      - name: Checkout latest release tag
        if: steps.release.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Capture checked-out revision
        if: steps.release.outputs.found == 'true'
        id: source
        shell: bash
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker Hub repositories
        if: steps.release.outputs.found == 'true'
        id: images
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_WEB_REPOSITORY: ${{ vars.DOCKERHUB_WEB_REPOSITORY }}
          DOCKERHUB_AUTH_REPOSITORY: ${{ vars.DOCKERHUB_AUTH_REPOSITORY }}
        run: |
          set -euo pipefail

          if [[ -z "${DOCKERHUB_NAMESPACE}" && ( -z "${DOCKERHUB_WEB_REPOSITORY}" || -z "${DOCKERHUB_AUTH_REPOSITORY}" ) ]]; then
            echo '::error::Set `DOCKERHUB_NAMESPACE`, or provide both `DOCKERHUB_WEB_REPOSITORY` and `DOCKERHUB_AUTH_REPOSITORY`.'
            exit 1
          fi

          repo_name="${GITHUB_REPOSITORY#*/}"
          web_image="${DOCKERHUB_WEB_REPOSITORY:-${DOCKERHUB_NAMESPACE}/${repo_name}-web}"
          auth_image="${DOCKERHUB_AUTH_REPOSITORY:-${DOCKERHUB_NAMESPACE}/${repo_name}-auth}"

          echo "web_image=${web_image}" >> "$GITHUB_OUTPUT"
          echo "auth_image=${auth_image}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: steps.release.outputs.found == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Probe Docker Hub tags for latest release
        if: steps.release.outputs.found == 'true'
        id: probe
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          WEB_IMAGE: ${{ steps.images.outputs.web_image }}
          AUTH_IMAGE: ${{ steps.images.outputs.auth_image }}
        run: |
          set -euo pipefail

          should_build=false
          missing_refs=()

          for image in "$WEB_IMAGE" "$AUTH_IMAGE"; do
            if docker manifest inspect "${image}:${RELEASE_TAG}" >/dev/null 2>&1; then
              echo "Found ${image}:${RELEASE_TAG}"
            else
              echo "Missing ${image}:${RELEASE_TAG}"
              missing_refs+=("${image}:${RELEASE_TAG}")
              should_build=true
            fi
          done

          echo "should_build=${should_build}" >> "$GITHUB_OUTPUT"

          if [[ ${#missing_refs[@]} -eq 0 ]]; then
            echo 'missing_refs=none' >> "$GITHUB_OUTPUT"
          else
            echo "missing_refs=${missing_refs[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when Docker Hub already has this release
        if: steps.release.outputs.found == 'true' && steps.probe.outputs.should_build != 'true'
        run: echo "Docker Hub already contains ${{ steps.release.outputs.tag }} for both images. Skipping build."

      - name: Set up Docker Buildx
        if: steps.release.outputs.found == 'true' && steps.probe.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        if: steps.release.outputs.found == 'true' && steps.probe.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web_image }}:${{ steps.release.outputs.tag }}
            ${{ steps.images.outputs.web_image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.revision }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            org.opencontainers.image.url=${{ steps.release.outputs.url }}
          cache-from: type=gha,scope=release-web
          cache-to: type=gha,mode=max,scope=release-web

      - name: Build and push auth image
        if: steps.release.outputs.found == 'true' && steps.probe.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auth-service/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.auth_image }}:${{ steps.release.outputs.tag }}
            ${{ steps.images.outputs.auth_image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.revision }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            org.opencontainers.image.url=${{ steps.release.outputs.url }}
          cache-from: type=gha,scope=release-auth
          cache-to: type=gha,mode=max,scope=release-auth

      - name: Write workflow summary
        if: always()
        shell: bash
        env:
          RELEASE_FOUND: ${{ steps.release.outputs.found }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          SOURCE_REVISION: ${{ steps.source.outputs.revision }}
          WEB_IMAGE: ${{ steps.images.outputs.web_image }}
          AUTH_IMAGE: ${{ steps.images.outputs.auth_image }}
          SHOULD_BUILD: ${{ steps.probe.outputs.should_build }}
          MISSING_REFS: ${{ steps.probe.outputs.missing_refs }}
        run: |
          {
            echo '## Release image publish summary'
            if [[ "${RELEASE_FOUND}" != 'true' ]]; then
              echo '- No published GitHub release found.'
              exit 0
            fi

            echo "- Latest release: ${RELEASE_TAG}"
            echo "- Release URL: ${RELEASE_URL}"
            echo "- Source revision: ${SOURCE_REVISION}"
            echo "- Web image: ${WEB_IMAGE}"
            echo "- Auth image: ${AUTH_IMAGE}"

            if [[ "${SHOULD_BUILD}" == 'true' ]]; then
              echo "- Action: built and pushed missing release images (${MISSING_REFS})"
            else
              echo '- Action: skipped because Docker Hub already has both release tags.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
