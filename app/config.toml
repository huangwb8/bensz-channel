# bensz-channel 项目配置文件
# 此文件包含项目元信息和应用默认配置

[project]
name = "bensz-channel"
version = "1.35.0"
description = "现代化 Web 社区平台，基于 PHP、PostgreSQL、Docker 构建，适合团队协作与知识分享"
repository_url = "https://github.com/huangwb8/bensz-channel"

[env]
# 服务器配置
WEB_HOST = "localhost"
WEB_PORT = 6542
MAILPIT_PORT = 8025
AUTH_HOST = "auth"
AUTH_PORT = 3001
AUTH_DB_SCHEMA = "auth"

# 应用基础配置
APP_NAME = "Bensz Channel"
APP_ENV = "production"
APP_DEBUG = false
APP_LOCALE = "zh_CN"
APP_FALLBACK_LOCALE = "zh_CN"
APP_FAKER_LOCALE = "zh_CN"
APP_MAINTENANCE_DRIVER = "file"
APP_URL = "http://localhost:6542"

# 站点信息
SITE_NAME = "Bensz Channel"
SITE_TAGLINE = "专注内容与交流的 Web 社区平台，支持频道管理、静态游客访问与成员互动"
PROJECT_REPOSITORY_URL = "https://github.com/huangwb8/bensz-channel"
ARTICLE_IMAGE_MAX_MB = 50
VIDEO_UPLOAD_MAX_MB = 500

# 日志配置
LOG_CHANNEL = "stack"
LOG_STACK = "stderr"
LOG_LEVEL = "info"

# 数据库配置
DB_CONNECTION = "pgsql"
DB_HOST = "postgres"
DB_PORT = 5432
DB_DATABASE = "bensz_channel"
DB_USERNAME = "bensz"
POSTGRES_DB = "bensz_channel"
POSTGRES_USER = "bensz"

# 会话配置
SESSION_DRIVER = "database"
SESSION_COOKIE = "bensz_channel_session"
SESSION_LIFETIME = 120
SESSION_ENCRYPT = false
SESSION_PATH = "/"
SESSION_DOMAIN = "null"

# 队列配置
QUEUE_CONNECTION = "database"

# 缓存配置
CACHE_STORE = "redis"
REDIS_CLIENT = "phpredis"
REDIS_HOST = "redis"
REDIS_PORT = 6379

# 邮件配置
MAIL_MAILER = "smtp"
MAIL_HOST = "mailpit"
MAIL_PORT = 1025
MAIL_SCHEME = "null"
MAIL_FROM_ADDRESS = "noreply@bensz-channel.local"
MAIL_FROM_NAME = "Bensz Channel"

# 认证配置
AUTH_DRIVER = "better_auth"
AUTH_OTP_TTL = 10
AUTH_OTP_LENGTH = 6
AUTH_QR_TTL = 10
AUTH_PREVIEW_CODES = false
BETTER_AUTH_TIMEOUT = 5
BETTER_AUTH_URL = "http://auth:3001"
BETTER_AUTH_BASE_URL = "http://auth:3001"
BETTER_AUTH_TRUSTED_ORIGINS = "http://localhost:6542"
PORT = 3001

# 微信登录配置
WECHAT_QR_MODE = "demo"
WECHAT_TIMEOUT = 8

# QQ 登录配置
QQ_QR_MODE = "demo"
QQ_TIMEOUT = 8

# 静态站点配置
STATIC_SITE_ENABLED = true
STATIC_SITE_ASYNC = true
STATIC_SITE_OUTPUT_DIR = "static"
STATIC_SITE_QUEUE = "static-builds"
STATIC_SITE_GZIP_LEVEL = 6
STATIC_SITE_CHANNEL_CHUNK_SIZE = 50
STATIC_SITE_ARTICLE_CHUNK_SIZE = 100

# 管理员配置
ADMIN_NAME = "频道管理员"
ADMIN_EMAIL = "admin@example.com"
