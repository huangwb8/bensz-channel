server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    error_page 418 = @dynamic;

    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml text/xml;
    gzip_min_length 1024;

    set $serve_static 1;

    if ($request_method !~ ^(GET|HEAD)$) {
        set $serve_static 0;
    }

    if ($http_cookie ~* "(^|;\\s)bensz_channel_session=") {
        set $serve_static 0;
    }

    location /build/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /static/ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        try_files $uri $uri/ =404;
    }

    location = / {
        if ($serve_static = 0) {
            return 418;
        }

        try_files /static/index.html @dynamic;
    }

    location ~ ^/channels/.+/articles/.+/?$ {
        if ($serve_static = 0) {
            return 418;
        }

        try_files /static$uri/index.html @dynamic;
    }

    location ~ ^/channels/.+/?$ {
        if ($serve_static = 0) {
            return 418;
        }

        try_files /static$uri/index.html @dynamic;
    }

    location / {
        try_files $uri $uri/ @dynamic;
    }

    location @dynamic {
        rewrite ^ /index.php?$query_string last;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 300;
    }

    location ~ /\. {
        deny all;
    }
}
