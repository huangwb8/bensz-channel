services:
  web:
    # 推荐流程：先执行 `./scripts/build.sh`，再执行 `./scripts/compose.sh up -d`
    image: "${WEB_IMAGE:-bensz-channel-web:latest}"
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "${WEB_PORT:-6542}:80"
    env_file:
      - config/.env
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - ./data/web/storage:/var/www/html/storage
      - ./data/web/bootstrap-cache:/var/www/html/bootstrap/cache
      - ./data/web/static:/var/www/html/public/${STATIC_SITE_OUTPUT_DIR:-static}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: "${WEB_IMAGE:-bensz-channel-web:latest}"
    entrypoint:
      - php
      - /var/www/html/artisan
      - queue:work
      - --queue=static-builds,default
      - --sleep=1
      - --tries=3
      - --timeout=900
    env_file:
      - config/.env
    depends_on:
      web:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data/web/storage:/var/www/html/storage
      - ./data/web/bootstrap-cache:/var/www/html/bootstrap/cache
      - ./data/web/static:/var/www/html/public/${STATIC_SITE_OUTPUT_DIR:-static}

  auth:
    # 推荐流程：先执行 `./scripts/build.sh`，再执行 `./scripts/compose.sh up -d`
    image: "${AUTH_IMAGE:-bensz-channel-auth:latest}"
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file:
      - config/.env
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    env_file:
      - config/.env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bensz} -d ${POSTGRES_DB:-bensz_channel}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --dir /data
    volumes:
      - ./data/redis:/data

  mailpit:
    image: axllent/mailpit:latest
    command: ["--database", "/data/mailpit.db"]
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    volumes:
      - ./data/mailpit:/data
